<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>龙虎榜资金看板</title>
    <meta name="description" content="每日 18:00 自动更新的龙虎榜资金看板，严格使用真实数据，不展示估算收盘价。" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='24' fill='%23111827'/><text x='50' y='58' text-anchor='middle' font-size='22' font-family='Arial' font-weight='800' fill='white'>LHB</text></svg>" />
    <link rel="stylesheet" href="./assets/styles.css" />
    <script defer src="./assets/app.js"></script>
  </head>
  <body>
    <main class="phone-shell">
      <header class="hero">
        <div>
          <p class="eyebrow">真实盘后数据 / 不估算收盘价</p>
          <h1>龙虎榜资金看板</h1>
          <p id="updatedText">正在读取数据...</p>
        </div>
        <div class="date-pill" id="datePill">--</div>
      </header>

      <section class="toolbar">
        <label for="dateSelect">历史日期</label>
        <select id="dateSelect" aria-label="选择历史日期"><option value="latest">最新数据</option></select>
      </section>

      <section class="notice" id="qualityNotice">数据读取中...</section>

      <section class="metric-grid">
        <article><span>明细</span><strong id="rowCount">--</strong></article>
        <article><span>游资</span><strong id="yzCount">--</strong></article>
        <article><span>席位</span><strong id="yybCount">--</strong></article>
        <article><span>收盘价确认</span><strong id="priceCount">--</strong></article>
      </section>

      <nav class="segmented" aria-label="看板视图">
        <button class="active" data-view="overview">净买入</button>
        <button data-view="sell">净卖出</button>
        <button data-view="yz">游资</button>
        <button data-view="yyb">机构</button>
      </nav>

      <section id="overview" class="view active">
        <div class="section-head"><h2>今日净买入个股</h2><span>Top 20</span></div>
        <div id="topStocks" class="list"></div>
      </section>

      <section id="sell" class="view">
        <div class="section-head"><h2>今日净卖出个股</h2><span>Top 20</span></div>
        <div id="sellStocks" class="list"></div>
      </section>

      <section id="yz" class="view">
        <div class="section-head"><h2>活跃游资</h2><span>按净买入</span></div>
        <div id="topYz" class="list"></div>
      </section>

      <section id="yyb" class="view">
        <div class="section-head"><h2>机构/营业部</h2><span>按净买入</span></div>
        <div id="topYyb" class="list"></div>
      </section>

      <section class="preselect">
        <div class="section-head">
          <div>
            <h2>稳健预选池</h2>
            <p>机构/深股通/沪股通，低吸观察，不追高</p>
          </div>
          <span id="poolUpdated">--</span>
        </div>
        <div id="poolStats" class="pool-stats"></div>
        <div id="poolList" class="list"></div>
      </section>

      <footer>
        GitHub Actions 每日北京时间 18:00 自动更新。价格与收益率仅在真实不复权日K收盘价确认后展示；本页面不构成投资建议。
      </footer>
    </main>
  </body>
</html>
